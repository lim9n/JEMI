<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday JEMI 🎂</title>
<style>

.birthday-text {
  font-size: 50px;
  font-weight: bold;
  text-align: center;
  background: linear-gradient(45deg, #ff4e50, #f9d423, #24c6dc, #ff6a00);
  background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: glow 2s ease-in-out infinite alternate;
  letter-spacing: 3px;
}

/* glowing effect */
@keyframes glow {
  from {
    text-shadow: 0 0 10px #ff4e50, 0 0 20px #f9d423;
  }
  to {
    text-shadow: 0 0 20px #24c6dc, 0 0 40px #ff6a00;
  }
}

body{
  margin:0;
  height:100vh;
  overflow:hidden;
  background:black;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

/* stars */
.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  animation:twinkle 2s infinite alternate;
}
@keyframes twinkle{
  from{opacity:0.2} to{opacity:1}
}

h1{
  font-size:60px;
  z-index:2;
}

/* message container */
#msg{
  font-size:24px;
  max-width:600px;
  margin-top:20px;
  z-index:2;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px; /* text and image spacing */
}

.magic-btn {
  padding: 15px 35px;
  font-size: 18px;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  color: white;
  background: linear-gradient(45deg, #ff6a00, #ff4e50);
  transition: all 0.3s ease;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  position: relative;
  overflow: hidden;
}

/* hover effect */
.magic-btn:hover {
  transform: scale(1.1);
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

/* click effect */
.magic-btn:active {
  transform: scale(0.95);
}

/* shine effect */
.magic-btn::before {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
  transition: 0.5s;
}

.magic-btn:hover::before {
  left: 100%;
}

button{
  margin-top:25px;
  padding:15px 35px;
  font-size:18px;
  border:none;
  border-radius:30px;
  background:#ff4d6d;
  color:white;
  cursor:pointer;
  z-index:2;
}
.birthday-img {
  width: 200px;
  height: 200px;
  object-fit: cover;
  border-radius: 50%; /* গোল ছবি */
  display: block;
  margin: 0 auto 20px;
  border: 5px solid white;
  box-shadow: 0 0 20px rgba(255,255,255,0.6);
  animation: float 3s ease-in-out infinite;
}

/* floating effect */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-15px); }
  100% { transform: translateY(0px); }
}

.firework{
  position:absolute;
  font-size:28px;
  animation:explode 1.5s ease-out forwards;
}
@keyframes explode{
  0%{transform:scale(0)}
  80%{transform:scale(2)}
  100%{opacity:0}
}
</style>
</head>

<body>

<!-- Background Music -->

<img src="images/jem.jpeg" class="birthday-img">
<h1 class="birthday-text">Happy Birthday JEMI!! 🎉🎂</h1>

<div id="msg"><span id="typewriter"></span></div>

<audio id="bgMusic" loop>
  <source src="Music/happy_birthday.mp3" type="audio/mp3">
</audio>

<button onclick="startShow()" class="magic-btn">Click here ✨</button>


<script>
// ⭐ Star field
for(let i=0;i<120;i++){
  let star=document.createElement("div");
  star.className="star";
  star.style.left=Math.random()*100+"vw";
  star.style.top=Math.random()*100+"vh";
  star.style.animationDuration=(1+Math.random()*2)+"s";
  document.body.appendChild(star);
}

// ✨ Typewriter text + image
const text = "Happy Birthday again. Some people have a quiet way of making the world feel a little brighter, simply by being themselves. I hope this day brings you moments of peace, genuine happiness and all the good things you truly deserve. May the year ahead unfold gently for you, filled with beautiful memories and meaningful successes 🎉✨."

let i = 0;
let imageShown = false;
let typingSpeed = 35;

function typeWriter() {
    if (i < text.length) {
        document.getElementById("typewriter").textContent += text.charAt(i);
        i++;

        // ✨ Image show (better timing)
        if (!imageShown && i > text.length / 3) {
            showImage();
            imageShown = true;
        }

        setTimeout(typeWriter, typingSpeed);
    } else {
        // 🎉 typing শেষ হলে final effect
        launchFireworks(20);
    }
}

// 🎬 Image function (clean & reusable)
function showImage() {
    let img = document.createElement("img");
    img.src = "images/final.jpeg";

    img.style.width = "200px";
    img.style.borderRadius = "20px";
    img.style.marginTop = "20px";
    img.style.display = "block";

    // initial state
    img.style.opacity = "0";
    img.style.transform = "scale(0.6) rotate(-5deg)";
    img.style.transition = "all 1s ease";

    img.style.boxShadow = "0 0 25px rgba(255,255,255,0.7)";

    document.getElementById("msg").appendChild(img);

    // animation
    setTimeout(() => {
        img.style.opacity = "1";
        img.style.transform = "scale(1) rotate(0deg)";
    }, 100);

    // hover 💫
    img.onmouseover = () => {
        img.style.transform = "scale(1.1) rotate(2deg)";
    };

    img.onmouseout = () => {
        img.style.transform = "scale(1) rotate(0deg)";
    };
}

// 🎆 Single firework
function firework() {
    let f = document.createElement("div");
    f.className = "firework";
    f.innerHTML = ["🎆","✨","🎇","💥"][Math.floor(Math.random()*4)];

    f.style.left = Math.random() * 100 + "vw";
    f.style.top = Math.random() * 80 + "vh";

    document.body.appendChild(f);
    setTimeout(() => f.remove(), 1200);
}

// 🎇 controlled fireworks burst
function launchFireworks(count) {
    let interval = setInterval(() => {
        firework();
        count--;
        if (count <= 0) clearInterval(interval);
    }, 200);
}

// 🚀 Start show
function startShow() {
    let btn = document.querySelector(".magic-btn");
    btn.style.display = "none"; // button hide

    let music = document.getElementById("bgMusic");
    music.volume = 0.5;
    music.play();

    typeWriter();

    // background light fireworks
    setInterval(firework, 800);
}

// ⭐ Falling stars effect
function createStar(){
    let star = document.createElement("div");
    star.innerHTML = "⭐";
    star.style.position = "absolute";
    star.style.left = Math.random()*100 + "vw";
    star.style.top = "-10px";
    star.style.fontSize = (10 + Math.random()*20) + "px";
    star.style.opacity = 0.8;
    star.style.transition = "top 4s linear, opacity 4s linear";
    document.body.appendChild(star);
    setTimeout(()=>{ star.style.top = "100vh"; star.style.opacity = 0; }, 50);
    setTimeout(()=> star.remove(), 4000);
}
setInterval(createStar, 300);
</script>

</body>
</html>
